<section class="page planning-page">
  <div class="page-header">
    <div>
      <h2>Planejamento</h2>
      <p>Organize o próximo encontro por etapas.</p>
    </div>
  </div>

  <div class="planning-campaign-select">
    <label>
      Campanha
      <select id="sessaoCampanhaSelect">
        <option value="">Carregando campanhas...</option>
      </select>
    </label>
  </div>

  <div class="progressive-section-list planning-sections">
    <details class="progressive-section" open>
      <summary>
        <span>Visão geral</span>
        <small>Título e resumo</small>
      </summary>

      <div class="progressive-section-content">
        <label>
          Título da sessão
          <input type="text" id="sessaoTitulo" placeholder="Ex: A chegada à cidade destruída" />
        </label>

        <label>
          Resumo da sessão
          <textarea id="sessaoResumo" placeholder="Resumo geral do que deve acontecer na sessão..."></textarea>
        </label>
      </div>
    </details>

    <details class="progressive-section">
      <summary>
        <span>Cenas e objetivos</span>
        <small>Estrutura do encontro</small>
      </summary>

      <div class="progressive-section-content">
        <label>
          Cenas principais
          <textarea id="sessaoCenas" placeholder="Cenas, encontros e revelações importantes..."></textarea>
        </label>

        <label>
          Objetivos dos jogadores
          <textarea id="sessaoObjetivos" placeholder="Objetivos principais e secundários..."></textarea>
        </label>
      </div>
    </details>

    <details class="progressive-section">
      <summary>
        <span>Notas privadas</span>
        <small>Segredos e eventos planejados</small>
      </summary>

      <div class="progressive-section-content">
        <label>
          Anotações do mestre
          <textarea id="sessaoNotas" placeholder="Segredos, pistas e lembretes..."></textarea>
        </label>

        <label>
          Eventos planejados
          <textarea id="sessaoEventos" placeholder="Emboscadas, encontros e mudanças de cenário..."></textarea>
        </label>
      </div>
    </details>
  </div>

  <div class="planning-save-row">
    <button class="primary-btn" id="btnSalvarRoteiroSessao">Salvar planejamento</button>
  </div>
</section>
