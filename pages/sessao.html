<section class="page">
  <div class="page-header">
    <h2>Roteiro da Sessão</h2>
    <p>Organize cenas, objetivos, anotações, ganchos narrativos e eventos da campanha.</p>
  </div>

  <div class="form-card">
    <h3>Campanha</h3>

    <label>
      Selecionar campanha
      <select id="sessaoCampanhaSelect">
        <option value="">Carregando campanhas...</option>
      </select>
    </label>
  </div>

  <div class="form-card">
    <h3>Roteiro</h3>

    <label>
      Título da sessão
      <input type="text" id="sessaoTitulo" placeholder="Ex: A chegada à cidade destruída" />
    </label>

    <label>
      Resumo da sessão
      <textarea id="sessaoResumo" placeholder="Resumo geral do que deve acontecer na sessão..."></textarea>
    </label>

    <label>
      Cenas principais
      <textarea id="sessaoCenas" placeholder="Liste as cenas principais, encontros, revelações e momentos importantes..."></textarea>
    </label>

    <label>
      Objetivos dos jogadores
      <textarea id="sessaoObjetivos" placeholder="Objetivos principais e secundários da sessão..."></textarea>
    </label>

    <label>
      Anotações do mestre
      <textarea id="sessaoNotas" placeholder="Notas privadas, segredos, improvisos, pistas e lembretes..."></textarea>
    </label>

    <label>
      Eventos planejados
      <textarea id="sessaoEventos" placeholder="Eventos, emboscadas, encontros, mudanças de cenário..."></textarea>
    </label>

    <button class="primary-btn" id="btnSalvarRoteiroSessao">Salvar roteiro</button>
  </div>
</section>
