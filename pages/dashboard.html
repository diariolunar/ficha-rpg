<section class="page dashboard-page">
  <div class="page-header">
    <div>
      <h2>Início</h2>
      <p>Acompanhe sua mesa e continue de onde parou.</p>
    </div>
  </div>

  <section class="dashboard-next-step" aria-labelledby="dashboardProximaAcao">
    <div>
      <span class="dashboard-eyebrow">Próximo passo</span>
      <h3 id="dashboardProximaAcao">Carregando sua mesa...</h3>
      <p id="dashboardProximaDescricao">Organizando campanhas e personagens.</p>
    </div>

    <button class="primary-btn" id="dashboardProximaAcaoBtn" data-page-target="campanhas">
      Continuar
    </button>
  </section>

  <div class="dashboard-metrics" aria-label="Resumo da conta">
    <div>
      <span>Campanhas</span>
      <strong id="contadorCampanhas">0</strong>
    </div>

    <div>
      <span>Personagens</span>
      <strong id="contadorPersonagens">0</strong>
    </div>

    <div>
      <span>Raças</span>
      <strong id="contadorRacas">0</strong>
    </div>

    <div>
      <span>Itens e habilidades</span>
      <strong id="contadorRecursos">0</strong>
    </div>
  </div>

  <div class="dashboard-action-groups">
    <section class="dashboard-action-group">
      <div class="dashboard-group-heading">
        <h3>Sua mesa</h3>
        <span id="dashboardSessaoStatus">Nenhuma sessão ativa</span>
      </div>

      <div class="dashboard-action-list">
        <button type="button" data-page-target="campanhas">
          <span>Campanhas</span>
          <strong id="dashboardCampanhasStatus">0 cadastradas</strong>
        </button>

        <button type="button" data-page-target="personagens">
          <span>Personagens</span>
          <strong id="dashboardPersonagensStatus">0 cadastrados</strong>
        </button>
      </div>
    </section>

    <section class="dashboard-action-group mestre-nav">
      <div class="dashboard-group-heading">
        <h3>Preparação do mestre</h3>
        <span>Ferramentas</span>
      </div>

      <div class="dashboard-action-list">
        <button type="button" data-page-target="mestre">
          <span>Sessão ao vivo</span>
          <strong>Controle da mesa</strong>
        </button>

        <button type="button" data-page-target="sessao">
          <span>Planejamento</span>
          <strong>Roteiro da sessão</strong>
        </button>

        <button type="button" data-page-target="cadastrosRacas">
          <span>Cadastros</span>
          <strong>Conteúdo do jogo</strong>
        </button>
      </div>
    </section>
  </div>
</section>
