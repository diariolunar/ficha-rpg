<section class="page">
  <div class="page-header page-header-actions">
    <div>
      <h2>Cadastro de Habilidades</h2>
      <p>Gerencie habilidades, custos, cooldowns, efeitos, alcance e evolução.</p>
    </div>

    <div class="action-row">
      <button class="secondary-btn" id="abrirImportacaoHabilidades">Importar em massa</button>
      <button class="primary-btn" id="abrirCadastroHabilidades">+ Cadastrar nova habilidade</button>
    </div>
  </div>

  <div class="list-card">
    <div class="list-header-with-search">
      <div>
        <h3>Habilidades cadastradas</h3>
        <p>Busque por nome, tipo, custo, cooldown, efeito, alcance ou evolução.</p>
      </div>

      <input
        type="search"
        id="buscaHabilidades"
        class="search-input"
        placeholder="Buscar habilidade..."
        autocomplete="off"
      />
    </div>

    <div id="listaHabilidades" class="resource-list" data-search-input="buscaHabilidades">
      <p>Carregando habilidades...</p>
    </div>
  </div>
</section>
