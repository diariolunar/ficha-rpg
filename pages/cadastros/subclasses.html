<section class="page">
  <div class="page-header">
    <h2>Cadastro de Subclasses</h2>
    <p>Crie especializações vinculadas às classes principais.</p>
  </div>

  <div class="form-card">
    <h3>Cadastrar Subclasse</h3>

    <div class="form-grid">
      <label>
        Nome da subclasse
        <input type="text" id="subclasseNome" placeholder="Ex: Feiticeiro, Invocador..." />
      </label>

      <label>
        Classe vinculada
        <select id="subclasseClasse">
          <option value="">Em breve: selecionar classe cadastrada</option>
        </select>
      </label>

      <label>
        HP bônus
        <input type="number" id="subclasseHp" placeholder="Ex: 5" />
      </label>

      <label>
        Mana bônus
        <input type="number" id="subclasseMana" placeholder="Ex: 15" />
      </label>
    </div>

    <label>
      Descrição da subclasse
      <textarea id="subclasseDescricao" placeholder="Explique o que essa subclasse permite fazer..."></textarea>
    </label>

    <label>
      Regras especiais
      <textarea id="subclasseRegras" placeholder="Ex: Libera sub-elemento, aumenta limite de pets..."></textarea>
    </label>

    <button class="primary-btn" id="salvarSubclasse">Salvar subclasse</button>
  </div>

  <div class="list-card">
    <h3>Subclasses cadastradas</h3>
    <div id="listaSubclasses" class="campaign-list">
      <p>Em breve este cadastro será conectado ao Firebase.</p>
    </div>
  </div>
</section>
