<section class="page">
  <div class="page-header page-header-actions">
    <div>
      <h2>Cadastro de Subclasses</h2>
      <p>Gerencie as subclasses disponíveis para os personagens.</p>
    </div>

    <div class="action-row">
      <button class="secondary-btn" id="abrirImportacaoSubclasses">Importar em massa</button>
      <button class="primary-btn" id="abrirCadastroSubclasses">+ Cadastrar nova subclasse</button>
    </div>
  </div>

  <div class="list-card">
    <div class="list-header-with-search">
      <div>
        <h3>Subclasses cadastradas</h3>
        <p>Busque por nome, estilo, vantagens, desvantagens, habilidades ou requisitos.</p>
      </div>

      <input
        type="search"
        id="buscaSubclasses"
        class="search-input"
        placeholder="Buscar subclasse..."
        autocomplete="off"
      />
    </div>

    <div id="listaSubclasses" class="resource-list" data-search-input="buscaSubclasses">
      <p>Carregando subclasses...</p>
    </div>
  </div>
</section>
