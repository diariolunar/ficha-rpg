<section class="page">
  <div class="page-header">
    <h2>Cadastro de Raças</h2>
    <p>Crie raças com status base, modificadores, vantagens, afinidades e restrições.</p>
  </div>

  <div class="form-card">
    <h3>Cadastrar Raça</h3>

    <div class="form-grid">
      <label>
        Nome da raça
        <input type="text" id="racaNome" placeholder="Ex: Goblin, Elfo, Dragonato..." />
      </label>

      <label>
        HP Base
        <input type="number" id="racaHpBase" placeholder="Ex: 60" />
      </label>

      <label>
        Mana Base
        <input type="number" id="racaManaBase" placeholder="Ex: 30" />
      </label>

      <label>
        Força Física
        <input type="number" id="racaForcaFisica" placeholder="Ex: 5" />
      </label>

      <label>
        Força Mágica
        <input type="number" id="racaForcaMagica" placeholder="Ex: 2" />
      </label>

      <label>
        Defesa Física
        <input type="number" id="racaDefesaFisica" placeholder="Ex: 4" />
      </label>

      <label>
        Defesa Mágica
        <input type="number" id="racaDefesaMagica" placeholder="Ex: 3" />
      </label>

      <label>
        Velocidade
        <input type="number" id="racaVelocidade" placeholder="Ex: 8" />
      </label>

      <label>
        Resistência
        <input type="number" id="racaResistencia" placeholder="Ex: 6" />
      </label>
    </div>

    <div class="form-grid">
      <label>
        Modificador de Carisma
        <input type="text" id="racaCarismaBonus" placeholder="Ex: +2 em testes de persuasão" />
      </label>

      <label>
        Modificador de Fator Medo
        <input type="text" id="racaFatorMedoBonus" placeholder="Ex: +3 em testes de intimidação" />
      </label>
    </div>

    <label>
      Vantagens / Bônus
      <textarea id="racaVantagens" placeholder="Ex: Visão noturna, bônus em furtividade, resistência a veneno..."></textarea>
    </label>

    <label>
      Desvantagens / Penalidades
      <textarea id="racaDesvantagens" placeholder="Ex: Penalidade contra luz, baixa defesa mágica, fraqueza elemental..."></textarea>
    </label>

    <div class="multi-select-box">
      <label>
        Classes Sugeridas
        <select id="selectClassesSugeridas">
          <option value="">Carregando classes...</option>
        </select>
      </label>

      <button class="secondary-btn" type="button" id="adicionarClasseSugerida">Adicionar classe sugerida</button>

      <div id="listaClassesSugeridasSelecionadas" class="selected-list">
        <span class="empty-selection">Nenhuma classe sugerida selecionada.</span>
      </div>
    </div>

    <div class="multi-select-box">
      <label>
        Elementos Afins
        <select id="selectElementosAfins">
          <option value="">Carregando elementos...</option>
        </select>
      </label>

      <button class="secondary-btn" type="button" id="adicionarElementoAfim">Adicionar elemento afim</button>

      <div id="listaElementosAfinsSelecionados" class="selected-list">
        <span class="empty-selection">Nenhum elemento afim selecionado.</span>
      </div>
    </div>

    <label>
      Habilidade Exclusiva
      <select id="racaHabilidadeExclusiva">
        <option value="">Carregando habilidades...</option>
      </select>
    </label>

    <div class="multi-select-box">
      <label>
        Restrição de Classe
        <select id="selectRestricaoClasse">
          <option value="">Carregando classes...</option>
        </select>
      </label>

      <button class="secondary-btn" type="button" id="adicionarRestricaoClasse">Adicionar restrição</button>

      <div id="listaRestricoesClasseSelecionadas" class="selected-list">
        <span class="empty-selection">Nenhuma restrição de classe selecionada.</span>
      </div>
    </div>

    <button class="primary-btn" id="salvarRaca">Salvar raça</button>
  </div>

  <div class="list-card">
    <h3>Raças cadastradas</h3>
    <div id="listaRacas" class="resource-list">
      <p>Carregando raças...</p>
    </div>
  </div>
</section>
