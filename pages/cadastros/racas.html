<section class="page">
  <div class="page-header page-header-actions">
    <div>
      <h2>Cadastro de Raças</h2>
      <p>Gerencie as raças disponíveis para criação de personagens.</p>
    </div>

    <div class="action-row">
      <button class="secondary-btn" id="abrirImportacaoRacas">Importar em massa</button>
      <button class="primary-btn" id="abrirCadastroRacas">+ Cadastrar nova raça</button>
    </div>
  </div>

  <div class="list-card">
    <div class="list-header-with-search">
      <div>
        <h3>Raças cadastradas</h3>
        <p>Busque por nome, vantagens, desvantagens, classes sugeridas, elementos afins ou restrições.</p>
      </div>

      <input
        type="search"
        id="buscaRacas"
        class="search-input"
        placeholder="Buscar raça..."
        autocomplete="off"
      />
    </div>

    <div id="listaRacas" class="resource-list">
      <p>Carregando raças...</p>
    </div>
  </div>
</section>
