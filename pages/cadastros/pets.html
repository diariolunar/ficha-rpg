<section class="page">
  <div class="page-header page-header-actions">
    <div>
      <h2>Cadastro de Pets</h2>
      <p>Gerencie pets, atributos, habilidades, suporte ao dono e evolução.</p>
    </div>

    <div class="action-row">
      <button class="secondary-btn" id="abrirImportacaoPets">Importar em massa</button>
      <button class="primary-btn" id="abrirCadastroPets">+ Cadastrar novo pet</button>
    </div>
  </div>

  <div class="list-card">
    <div class="list-header-with-search">
      <div>
        <h3>Pets cadastrados</h3>
        <p>Busque por nome, espécie, rank, suporte, evolução, elemento ou obtenção.</p>
      </div>

      <input
        type="search"
        id="buscaPets"
        class="search-input"
        placeholder="Buscar pet..."
        autocomplete="off"
      />
    </div>

    <div id="listaPets" class="resource-list" data-search-input="buscaPets">
      <p>Carregando pets...</p>
    </div>
  </div>
</section>
