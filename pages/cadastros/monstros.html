<section class="page">
  <div class="page-header page-header-actions">
    <div>
      <h2>Cadastro de Monstros</h2>
      <p>Gerencie monstros, ameaças, ataques, recompensas, drops e comportamento em combate.</p>
    </div>

    <div class="action-row">
      <button class="secondary-btn" id="abrirImportacaoMonstros">Importar em massa</button>
      <button class="primary-btn" id="abrirCadastroMonstros">+ Cadastrar novo monstro</button>
    </div>
  </div>

  <div class="list-card">
    <div class="list-header-with-search">
      <div>
        <h3>Monstros cadastrados</h3>
        <p>Busque por nome, tipo, rank, habitat, ataques, drops ou recompensa.</p>
      </div>

      <input
        type="search"
        id="buscaMonstros"
        class="search-input"
        placeholder="Buscar monstro..."
        autocomplete="off"
      />
    </div>

    <div id="listaMonstros" class="resource-list" data-search-input="buscaMonstros">
      <p>Carregando monstros...</p>
    </div>
  </div>
</section>
