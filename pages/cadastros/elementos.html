<section class="page">
  <div class="page-header page-header-actions">
    <div>
      <h2>Cadastro de Elementos</h2>
      <p>Gerencie os elementos, afinidades, fraquezas e combinações do sistema.</p>
    </div>

    <div class="action-row">
      <button class="secondary-btn" id="abrirImportacaoElementos">Importar em massa</button>
      <button class="primary-btn" id="abrirCadastroElementos">+ Cadastrar novo elemento</button>
    </div>
  </div>

  <div class="list-card">
    <div class="list-header-with-search">
      <div>
        <h3>Elementos cadastrados</h3>
        <p>Busque por nome, tipo, efeito, fraquezas, vantagens ou combinações.</p>
      </div>

      <input
        type="search"
        id="buscaElementos"
        class="search-input"
        placeholder="Buscar elemento..."
        autocomplete="off"
      />
    </div>

    <div id="listaElementos" class="resource-list" data-search-input="buscaElementos">
      <p>Carregando elementos...</p>
    </div>
  </div>
</section>
