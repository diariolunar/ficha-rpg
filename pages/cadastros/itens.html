<section class="page">
  <div class="page-header page-header-actions">
    <div>
      <h2>Cadastro de Itens</h2>
      <p>Gerencie armas, armaduras, consumíveis, artefatos, materiais, runas e demais itens do sistema.</p>
    </div>

    <div class="action-row">
      <button class="secondary-btn" id="abrirImportacaoItens">Importar em massa</button>
      <button class="primary-btn" id="abrirCadastroItens">+ Cadastrar novo item</button>
    </div>
  </div>

  <div class="list-card">
    <div class="list-header-with-search">
      <div>
        <h3>Itens cadastrados</h3>
        <p>Busque por nome, categoria, subcategoria, raridade, efeito, valor ou método de obtenção.</p>
      </div>

      <input
        type="search"
        id="buscaItens"
        class="search-input"
        placeholder="Buscar item..."
        autocomplete="off"
      />
    </div>

    <div id="listaItens" class="resource-list" data-search-input="buscaItens">
      <p>Carregando itens...</p>
    </div>
  </div>
</section>
