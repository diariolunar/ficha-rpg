<section class="page">
  <div class="page-header page-header-actions">
    <div>
      <h2>Cadastro de Classes</h2>
      <p>Gerencie as classes disponíveis para os personagens.</p>
    </div>

    <div class="action-row">
      <button class="secondary-btn" id="abrirImportacaoClasses">Importar em massa</button>
      <button class="primary-btn" id="abrirCadastroClasses">+ Cadastrar nova classe</button>
    </div>
  </div>

  <div class="list-card">
    <div class="list-header-with-search">
      <div>
        <h3>Classes cadastradas</h3>
        <p>Busque por nome, dano, defesa, atributos, habilidade exclusiva ou subclasses.</p>
      </div>

      <input
        type="search"
        id="buscaClasses"
        class="search-input"
        placeholder="Buscar classe..."
        autocomplete="off"
      />
    </div>

    <div id="listaClasses" class="resource-list">
      <p>Carregando classes...</p>
    </div>
  </div>
</section>
