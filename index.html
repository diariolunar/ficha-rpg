<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ficha RPG</title>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <section id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">⚔️</div>

      <h1>Ficha RPG</h1>
      <p>Sistema de campanhas, fichas e área do mestre.</p>

      <div class="auth-tabs">
        <button id="tabLogin" class="auth-tab active">Entrar</button>
        <button id="tabCadastro" class="auth-tab">Criar conta</button>
      </div>

      <div id="loginForm" class="auth-form">
        <label>
          E-mail
          <input type="email" id="loginEmail" placeholder="seuemail@email.com" />
        </label>

        <label>
          Senha
          <input type="password" id="loginSenha" placeholder="Sua senha" />
        </label>

        <button id="btnLogin" class="primary-btn full-btn">Entrar</button>
      </div>

      <div id="cadastroForm" class="auth-form hidden">
        <label>
          Nome
          <input type="text" id="cadastroNome" placeholder="Seu nome" />
        </label>

        <label>
          E-mail
          <input type="email" id="cadastroEmail" placeholder="seuemail@email.com" />
        </label>

        <label>
          Senha
          <input type="password" id="cadastroSenha" placeholder="Crie uma senha" />
        </label>

        <label>
          Tipo de conta
          <select id="cadastroTipo">
            <option value="jogador">Jogador</option>
            <option value="mestre">Mestre</option>
          </select>
        </label>

        <button id="btnCadastro" class="primary-btn full-btn">Criar conta</button>
      </div>

      <p id="authMensagem" class="auth-message"></p>
    </div>
  </section>

  <aside class="sidebar">
    <div class="logo-area">
      <div class="logo-icon">⚔️</div>
      <div>
        <h1>Ficha RPG</h1>
        <p>Sistema de Campanha</p>
      </div>
    </div>

    <nav>
      <button class="nav-btn active" data-page="dashboard">🏠 Dashboard</button>
      <button class="nav-btn" data-page="campanhas">🗺️ Campanhas</button>
      <button class="nav-btn mestre-nav" data-page="mestre">🧙 Área do Mestre</button>
      <button class="nav-btn" data-page="personagens">🛡️ Personagens</button>
      <button class="nav-btn mestre-nav" data-page="cadastros">📚 Cadastros Base</button>
      <button class="nav-btn" data-page="ficha">📜 Ficha</button>
      <button class="nav-btn mestre-nav" data-page="sessao">🕯️ Roteiro da Sessão</button>
    </nav>

    <div class="user-box">
      <p>Logado como:</p>
      <strong id="usuarioNome">Carregando...</strong>
      <span id="usuarioTipo">---</span>
      <button id="btnSair" class="logout-btn">Sair</button>
    </div>
  </aside>

  <main id="appContent" class="main-content">
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
